<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Board</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/setTime.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <button id="start-button">Bắt đầu</button>
        </header>

        <main>
            <div id="board">
                <div class="box box1">1</div>
                <div class="box box2">2</div>
                <div class="box box3">3</div>
                <div class="box box4">4</div>
                <div class="box box5">5</div>
                <div class="box box6">6</div>
                <div class="box box7">7</div>
                <div class="box box8">8</div>
                <div class="box box9">9</div>
                <div class="box box10">10</div>
                <div class="box box11">11</div>
                <div class="box box12"></div>
            </div>
            <div id="taskbar">
                <div id="clock">
                    <p>Đồng hồ</p>
                    <p><span id="minute">00</span>:<span id="second">00</span></p>
                </div>
                <div id="move">
                    <p>Hướng dẫn di chuyển</p>
                    <div class="key-group">
                        <div class="key up">↑</div>
                        <div class="key left">←</div>
                        <div class="key down">↓</div>
                        <div class="key right">→</div>
                    </div>

                    <div class="key-group">
                        <div class="key up">W</div>
                        <div class="key left">A</div>
                        <div class="key down">S</div>
                        <div class="key right">D</div>
                    </div>
                </div>

            </div>
        </main>


        <footer>
            <h4>Lịch sử lượt chơi</h4>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Bước đi</th>
                        <th>Thời gian</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>36</td>
                        <td>00:01:36</td>
                    </tr>
                </tbody>
            </table>
        </footer>
    </div>

</body>

</html>
